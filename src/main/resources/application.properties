spring.config.import=optional:file:.env[.properties]

spring.application.name=football-prediction

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/football_predictions}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:football}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:football}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

spring.flyway.enabled=true

spring.thymeleaf.cache=false
server.error.include-message=always

app.bootstrap.create-admin=${APP_BOOTSTRAP_CREATE_ADMIN:true}
app.bootstrap.admin-email=${APP_BOOTSTRAP_ADMIN_EMAIL:admin@example.com}
app.bootstrap.admin-password=${APP_BOOTSTRAP_ADMIN_PASSWORD:admin123}
app.bootstrap.admin-display-name=${APP_BOOTSTRAP_ADMIN_DISPLAY_NAME:Admin}
