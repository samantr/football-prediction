<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments :: head('Change Password')}"></head>
<body>
<nav th:replace="~{fragments :: nav}"></nav>
<main class="container narrow">
    <div th:replace="~{fragments :: flash}"></div>

    <section class="surface">
        <h1>Change Password</h1>
        <form th:action="@{/account/change-password}" method="post" th:object="${changePasswordForm}">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <p>
                <label for="currentPassword">Current password</label>
                <input id="currentPassword"
                       type="password"
                       name="currentPassword"
                       autocomplete="current-password"
                       required>
                <span class="field-error"
                      th:if="${#fields.hasErrors('currentPassword')}"
                      th:errors="*{currentPassword}"></span>
            </p>
            <p>
                <label for="newPassword">New password</label>
                <input id="newPassword"
                       type="password"
                       name="newPassword"
                       autocomplete="new-password"
                       required
                       minlength="8">
                <span class="field-error"
                      th:if="${#fields.hasErrors('newPassword')}"
                      th:errors="*{newPassword}"></span>
            </p>
            <p>
                <label for="confirmPassword">Confirm new password</label>
                <input id="confirmPassword"
                       type="password"
                       name="confirmPassword"
                       autocomplete="new-password"
                       required>
                <span class="field-error"
                      th:if="${#fields.hasErrors('confirmPassword')}"
                      th:errors="*{confirmPassword}"></span>
            </p>
            <button type="submit">Change Password</button>
        </form>
    </section>
</main>
</body>
</html>
