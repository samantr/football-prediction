<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments :: head('Puan Durumu')}"></head>
<body>
<nav th:replace="~{fragments :: nav}"></nav>
<main class="container">
    <div th:replace="~{fragments :: flash}"></div>

    <div class="page-header">
        <div>
            <h1>Puan Durumu</h1>
            <div class="muted" th:if="${selectedTournament}" th:text="|${selectedTournament.name} ${selectedTournament.season}|"></div>
        </div>
        <form th:if="${!#lists.isEmpty(tournaments)}" th:action="@{/leaderboard}" method="get">
            <select name="tournamentId" onchange="this.form.submit()">
                <option th:each="tournament : ${tournaments}"
                        th:value="${tournament.id}"
                        th:selected="${selectedTournament != null and selectedTournament.id == tournament.id}"
                        th:text="|${tournament.name} ${tournament.season}|"></option>
            </select>
        </form>
    </div>

    <div th:if="${#lists.isEmpty(tournaments)}" class="surface">
        Henüz turnuva yok.
    </div>

    <table th:if="${!#lists.isEmpty(tournaments)}">
        <thead>
        <tr>
            <th>Sıra</th>
            <th>Kullanıcı</th>
            <th>Toplam</th>
            <th>Tam skor</th>
            <th>Doğru sonuç</th>
            <th>Tahminler</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="entry, iter : ${leaderboard}">
            <td th:text="${iter.index + 1}"></td>
            <td th:text="${entry.displayName}"></td>
            <td th:text="${entry.totalScore}"></td>
            <td th:text="${entry.exactScores}"></td>
            <td th:text="${entry.outcomeScores}"></td>
            <td th:text="${entry.predictionsCount}"></td>
        </tr>
        <tr th:if="${#lists.isEmpty(leaderboard)}">
            <td colspan="6">Henüz kullanıcı yok.</td>
        </tr>
        </tbody>
    </table>
</main>
</body>
</html>
