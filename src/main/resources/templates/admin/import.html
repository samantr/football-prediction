<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments :: head('API İçe Aktarım')}"></head>
<body>
<nav th:replace="~{fragments :: nav}"></nav>
<main class="container">
    <div th:replace="~{fragments :: flash}"></div>

    <div class="page-header">
        <h1>API İçe Aktarım</h1>
        <a th:href="@{/admin}">Yönetim paneline dön</a>
    </div>

    <div th:if="${!tokenConfigured}" class="alert error">
        FOOTBALL_DATA_API_TOKEN tanımlı değil. İçe aktarım devre dışı.
    </div>

    <div th:if="${selectedTournament == null}" class="surface">
        Önce bir turnuva oluşturun.
    </div>

    <section th:if="${selectedTournament != null}" class="surface">
        <form th:action="@{/admin/import}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <div class="form-grid">
                <p>
                    <label for="tournamentId">Turnuva</label>
                    <select id="tournamentId" name="tournamentId" required>
                        <option th:each="tournament : ${tournaments}"
                                th:value="${tournament.id}"
                                th:selected="${selectedTournament != null and selectedTournament.id == tournament.id}"
                                th:text="|${tournament.name} ${tournament.season}|"></option>
                    </select>
                </p>
                <p>
                    <label for="competitionCode">Yarışma kodu</label>
                    <input id="competitionCode" name="competitionCode" th:value="${competitionCode}" required>
                </p>
                <p>
                    <label for="season">Sezon</label>
                    <input id="season" type="number" min="1900" name="season" th:value="${season}" required>
                </p>
            </div>
            <div class="actions">
                <button type="submit" name="syncType" value="teams" th:disabled="${!tokenConfigured}">Takımları senkronize et</button>
                <button type="submit" name="syncType" value="matches" th:disabled="${!tokenConfigured}">Maçları senkronize et</button>
                <button type="submit" name="syncType" value="all" th:disabled="${!tokenConfigured}">Tümünü senkronize et</button>
            </div>
        </form>
    </section>
</main>
</body>
</html>
