<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments :: head('Admin Tournaments')}"></head>
<body>
<nav th:replace="~{fragments :: nav}"></nav>
<main class="container">
    <div th:replace="~{fragments :: flash}"></div>

    <div class="page-header">
        <h1>Tournaments</h1>
        <a th:href="@{/admin}">Admin dashboard</a>
    </div>

    <section class="surface">
        <h2 th:text="${editTournament.id == null ? 'Create tournament' : 'Edit tournament'}"></h2>
        <form th:action="@{/admin/tournaments}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <input type="hidden" name="id" th:value="${editTournament.id}">
            <div class="form-grid">
                <p>
                    <label for="name">Name</label>
                    <input id="name" name="name" th:value="${editTournament.name}" required>
                </p>
                <p>
                    <label for="season">Season</label>
                    <input id="season" name="season" th:value="${editTournament.season}" required>
                </p>
                <p>
                    <label for="active">Active</label>
                    <input id="active" type="checkbox" name="active" value="true" th:checked="${editTournament.active}">
                </p>
            </div>
            <button type="submit">Save</button>
            <a th:if="${editTournament.id != null}" th:href="@{/admin/tournaments}">Cancel</a>
        </form>
    </section>

    <table>
        <thead>
        <tr>
            <th>Name</th>
            <th>Season</th>
            <th>Active</th>
            <th>Actions</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="tournament : ${tournaments}">
            <td th:text="${tournament.name}"></td>
            <td th:text="${tournament.season}"></td>
            <td th:text="${tournament.active ? 'Yes' : 'No'}"></td>
            <td><a th:href="@{/admin/tournaments(editId=${tournament.id})}">Edit</a></td>
        </tr>
        <tr th:if="${#lists.isEmpty(tournaments)}">
            <td colspan="4">No tournaments yet.</td>
        </tr>
        </tbody>
    </table>
</main>
</body>
</html>
