<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments :: head('Test Verilerini Temizle')}"></head>
<body>
<nav th:replace="~{fragments :: nav}"></nav>
<main class="container narrow">
    <div th:replace="~{fragments :: flash}"></div>

    <div class="page-header">
        <h1>Test Verilerini Temizle</h1>
        <a th:href="@{/admin}">Yönetim paneline dön</a>
    </div>

    <section class="surface">
        <p class="muted">
            Bu işlem tahminleri, eşleşme kurallarını, maçları, takımları, turnuvaları ve normal kullanıcıları siler.
            Yönetici kullanıcıları silmez.
        </p>
        <form th:action="@{/admin/cleanup}" method="post" onsubmit="return confirm('Silmek istediğinize emin misiniz?')">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <button class="danger-button" type="submit">Test verilerini temizle</button>
        </form>
    </section>
</main>
</body>
</html>
