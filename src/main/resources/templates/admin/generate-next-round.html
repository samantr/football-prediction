<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments :: head('Generate Next Round')}"></head>
<body>
<nav th:replace="~{fragments :: nav}"></nav>
<main class="container">
    <div th:replace="~{fragments :: flash}"></div>

    <div class="page-header">
        <h1>Generate Next Round</h1>
        <form th:if="${!#lists.isEmpty(tournaments)}" th:action="@{/admin/generate-next-round}" method="get">
            <select name="tournamentId" onchange="this.form.submit()">
                <option th:each="tournament : ${tournaments}"
                        th:value="${tournament.id}"
                        th:selected="${selectedTournament != null and selectedTournament.id == tournament.id}"
                        th:text="|${tournament.name} ${tournament.season}|"></option>
            </select>
        </form>
    </div>

    <div th:if="${selectedTournament == null}" class="surface">
        Create a tournament first.
    </div>

    <section th:if="${selectedTournament != null}" class="surface">
        <h2 th:text="${editRule.id == null ? 'Create bracket rule' : 'Edit bracket rule'}"></h2>
        <form th:action="@{/admin/generate-next-round/rules}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <input type="hidden" name="id" th:value="${editRule.id}">
            <input type="hidden" name="tournamentId" th:value="${selectedTournament.id}">
            <div class="form-grid">
                <p>
                    <label for="targetMatchId">Target match</label>
                    <select id="targetMatchId" name="targetMatchId" required>
                        <option th:each="match : ${matches}"
                                th:value="${match.id}"
                                th:selected="${editRule.targetMatch != null and editRule.targetMatch.id == match.id}"
                                th:text="|#${match.matchNo} ${match.stage}|"></option>
                    </select>
                </p>
                <p>
                    <label for="targetSide">Target side</label>
                    <select id="targetSide" name="targetSide" required>
                        <option th:each="side : ${targetSides}"
                                th:value="${side}"
                                th:selected="${editRule.targetSide == side}"
                                th:text="${side}"></option>
                    </select>
                </p>
                <p>
                    <label for="sourceType">Source type</label>
                    <select id="sourceType" name="sourceType" required>
                        <option th:each="type : ${sourceTypes}"
                                th:value="${type}"
                                th:selected="${editRule.sourceType == type}"
                                th:text="${type}"></option>
                    </select>
                </p>
                <p>
                    <label for="sourceValue">Source value</label>
                    <input id="sourceValue" name="sourceValue" th:value="${editRule.sourceValue}" required>
                </p>
            </div>
            <button type="submit">Save rule</button>
            <a th:if="${editRule.id != null}" th:href="@{/admin/generate-next-round(tournamentId=${selectedTournament.id})}">Cancel</a>
        </form>
    </section>

    <section th:if="${selectedTournament != null}" class="surface">
        <form th:action="@{/admin/generate-next-round}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <input type="hidden" name="tournamentId" th:value="${selectedTournament.id}">
            <button type="submit">Generate</button>
        </form>
    </section>

    <table th:if="${selectedTournament != null}">
        <thead>
        <tr>
            <th>Target</th>
            <th>Side</th>
            <th>Source type</th>
            <th>Source value</th>
            <th>Actions</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="rule : ${rules}">
            <td th:text="|#${rule.targetMatch.matchNo} ${rule.targetMatch.stage}|"></td>
            <td th:text="${rule.targetSide}"></td>
            <td th:text="${rule.sourceType}"></td>
            <td th:text="${rule.sourceValue}"></td>
            <td><a th:href="@{/admin/generate-next-round(tournamentId=${selectedTournament.id},editRuleId=${rule.id})}">Edit</a></td>
        </tr>
        <tr th:if="${#lists.isEmpty(rules)}">
            <td colspan="5">No bracket rules yet.</td>
        </tr>
        </tbody>
    </table>
</main>
</body>
</html>
