<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments :: head('Yönetim Sonuçları')}"></head>
<body>
<nav th:replace="~{fragments :: nav}"></nav>
<main class="container">
    <div th:replace="~{fragments :: flash}"></div>

    <div class="page-header">
        <h1>Sonuçlar</h1>
        <div class="actions">
            <a th:href="@{/admin}">Yönetim paneline dön</a>
            <form th:if="${!#lists.isEmpty(tournaments)}" th:action="@{/admin/results}" method="get">
                <select name="tournamentId" onchange="this.form.submit()">
                    <option th:each="tournament : ${tournaments}"
                            th:value="${tournament.id}"
                            th:selected="${selectedTournament != null and selectedTournament.id == tournament.id}"
                            th:text="|${tournament.name} ${tournament.season}|"></option>
                </select>
            </form>
        </div>
    </div>

    <div th:if="${selectedTournament == null}" class="surface">
        Önce bir turnuva oluşturun.
    </div>

    <table th:if="${selectedTournament != null}">
        <thead>
        <tr>
            <th>No</th>
            <th>Başlama (TRT)</th>
            <th>Maç</th>
            <th>Mevcut</th>
            <th>Sonuç gir</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="match : ${matches}">
            <td th:text="${match.matchNo}"></td>
            <td class="nowrap" th:text="${@matchTimes.formatTurkiye(match.kickoffAt)}"></td>
            <td>
                <span th:text="${match.homeTeam != null ? match.homeTeam.name : (match.placeholderHome != null ? match.placeholderHome : 'Belirlenecek')}"></span>
                <span> - </span>
                <span th:text="${match.awayTeam != null ? match.awayTeam.name : (match.placeholderAway != null ? match.placeholderAway : 'Belirlenecek')}"></span>
            </td>
            <td>
                <span th:if="${match.homeScore != null and match.awayScore != null}" th:text="|${match.homeScore} - ${match.awayScore}|"></span>
                <span th:if="${match.penaltyWinner != null}" class="muted"
                      th:text="| Penaltı: ${@uiLabels.matchSideLabel(match, match.penaltyWinner)}|"></span>
                <span th:unless="${match.homeScore != null and match.awayScore != null}" class="muted">Bekliyor</span>
            </td>
            <td>
                <form class="actions" th:action="@{/admin/results/{id}(id=${match.id})}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <input type="hidden" name="tournamentId" th:value="${selectedTournament.id}">
                    <input class="score-input" type="number" min="0" name="homeScore" th:value="${match.homeScore}" required>
                    <input class="score-input" type="number" min="0" name="awayScore" th:value="${match.awayScore}" required>
                    <select class="penalty-select" name="penaltyWinner"
                            th:if="${@uiLabels.eliminationStage(match.stage)}"
                            th:required="${match.homeScore != null and match.awayScore != null and match.homeScore == match.awayScore}">
                        <option value="">Penaltı</option>
                        <option value="HOME"
                                th:selected="${match.penaltyWinner == T(com.example.footballprediction.domain.TargetSide).HOME}"
                                th:text="|Penaltı: ${@uiLabels.matchSideLabel(match, T(com.example.footballprediction.domain.TargetSide).HOME)}|"></option>
                        <option value="AWAY"
                                th:selected="${match.penaltyWinner == T(com.example.footballprediction.domain.TargetSide).AWAY}"
                                th:text="|Penaltı: ${@uiLabels.matchSideLabel(match, T(com.example.footballprediction.domain.TargetSide).AWAY)}|"></option>
                    </select>
                    <button type="submit">Kaydet</button>
                </form>
            </td>
        </tr>
        <tr th:if="${#lists.isEmpty(matches)}">
            <td colspan="5">Henüz maç yok.</td>
        </tr>
        </tbody>
    </table>
</main>
</body>
</html>
