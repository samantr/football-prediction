<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments :: head('Admin Results')}"></head>
<body>
<nav th:replace="~{fragments :: nav}"></nav>
<main class="container">
    <div th:replace="~{fragments :: flash}"></div>

    <div class="page-header">
        <h1>Results</h1>
        <form th:if="${!#lists.isEmpty(tournaments)}" th:action="@{/admin/results}" method="get">
            <select name="tournamentId" onchange="this.form.submit()">
                <option th:each="tournament : ${tournaments}"
                        th:value="${tournament.id}"
                        th:selected="${selectedTournament != null and selectedTournament.id == tournament.id}"
                        th:text="|${tournament.name} ${tournament.season}|"></option>
            </select>
        </form>
    </div>

    <div th:if="${selectedTournament == null}" class="surface">
        Create a tournament first.
    </div>

    <table th:if="${selectedTournament != null}">
        <thead>
        <tr>
            <th>No</th>
            <th>Kickoff</th>
            <th>Match</th>
            <th>Current</th>
            <th>Enter result</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="match : ${matches}">
            <td th:text="${match.matchNo}"></td>
            <td class="nowrap" th:text="${#temporals.format(match.kickoffAt, 'yyyy-MM-dd HH:mm')}"></td>
            <td>
                <span th:text="${match.homeTeam != null ? match.homeTeam.name : (match.placeholderHome != null ? match.placeholderHome : 'TBD')}"></span>
                <span> vs </span>
                <span th:text="${match.awayTeam != null ? match.awayTeam.name : (match.placeholderAway != null ? match.placeholderAway : 'TBD')}"></span>
            </td>
            <td>
                <span th:if="${match.homeScore != null and match.awayScore != null}" th:text="|${match.homeScore} - ${match.awayScore}|"></span>
                <span th:unless="${match.homeScore != null and match.awayScore != null}" class="muted">Pending</span>
            </td>
            <td>
                <form class="actions" th:action="@{/admin/results/{id}(id=${match.id})}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <input type="hidden" name="tournamentId" th:value="${selectedTournament.id}">
                    <input class="score-input" type="number" min="0" name="homeScore" th:value="${match.homeScore}" required>
                    <input class="score-input" type="number" min="0" name="awayScore" th:value="${match.awayScore}" required>
                    <button type="submit">Save</button>
                </form>
            </td>
        </tr>
        <tr th:if="${#lists.isEmpty(matches)}">
            <td colspan="5">No matches yet.</td>
        </tr>
        </tbody>
    </table>
</main>
</body>
</html>
