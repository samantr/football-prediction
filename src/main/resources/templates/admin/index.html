<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments :: head('Yönetim')}"></head>
<body>
<nav th:replace="~{fragments :: nav}"></nav>
<main class="container">
    <div th:replace="~{fragments :: flash}"></div>

    <div class="page-header">
        <div>
            <h1>Yönetim</h1>
            <div class="muted" th:if="${selectedTournament}" th:text="|Aktif: ${selectedTournament.name} ${selectedTournament.season}|"></div>
        </div>
    </div>

    <section class="grid">
        <a class="stat" th:href="@{/admin/tournaments}">
            <strong th:text="${tournamentCount}"></strong>
            <span>Turnuvalar</span>
        </a>
        <a class="stat" th:href="@{/admin/teams}">
            <strong th:text="${teamCount}"></strong>
            <span>Takımlar</span>
        </a>
        <a class="stat" th:href="@{/admin/matches}">
            <strong th:text="${matchCount}"></strong>
            <span>Maçlar</span>
        </a>
        <a class="stat" th:href="@{/admin/reports}">
            <strong th:text="${userCount}"></strong>
            <span>Kullanıcılar</span>
        </a>
    </section>

    <section class="surface">
        <div class="actions">
            <a class="button" th:href="@{/admin/tournaments}">Turnuvalar</a>
            <a class="button" th:href="@{/admin/teams}">Takımlar</a>
            <a class="button" th:href="@{/admin/matches}">Maçlar</a>
            <a class="button" th:href="@{/admin/results}">Sonuçlar</a>
            <a class="button" th:href="@{/admin/reports}">Raporlar</a>
            <a class="button" th:href="@{/admin/generate-next-round}">Sonraki Turu Oluştur</a>
        </div>
    </section>
</main>
</body>
</html>
