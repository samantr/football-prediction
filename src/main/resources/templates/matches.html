<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments :: head('Maçlar')}"></head>
<body>
<nav th:replace="~{fragments :: nav}"></nav>
<main class="container">
    <div th:replace="~{fragments :: flash}"></div>

    <div class="page-header">
        <div>
            <h1>Maçlar</h1>
            <div class="muted" th:if="${selectedTournament}" th:text="|${selectedTournament.name} ${selectedTournament.season}|"></div>
        </div>
        <form th:if="${!#lists.isEmpty(tournaments)}" th:action="@{/matches}" method="get">
            <select name="tournamentId" onchange="this.form.submit()">
                <option th:each="tournament : ${tournaments}"
                        th:value="${tournament.id}"
                        th:selected="${selectedTournament != null and selectedTournament.id == tournament.id}"
                        th:text="|${tournament.name} ${tournament.season}|"></option>
            </select>
        </form>
    </div>

    <div th:if="${#lists.isEmpty(tournaments)}" class="surface">
        Henüz turnuva yok.
    </div>

    <p th:if="${selectedTournament != null}" class="muted">
        Tahminler maç başlangıcından 1 saat öncesine kadar düzenlenebilir.
    </p>

    <div th:if="${selectedTournament != null}" class="table-tools" data-match-tools>
        <label class="checkbox-control">
            <input type="checkbox" data-show-closed-predictions>
            <span>Kapalı tahminleri göster</span>
        </label>
    </div>

    <table th:if="${selectedTournament != null}" data-matches-table>
        <thead>
        <tr>
            <th>No</th>
            <th>Başlama (TRT)</th>
            <th>Aşama</th>
            <th>Maç</th>
            <th>Sonuç</th>
            <th>Tahmin</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="match : ${matches}"
            th:with="prediction=${predictionsByMatchId[match.id]}, editable=${editableByMatchId[match.id]}, classification=${classificationByMatchId[match.id]}"
            data-match-row
            th:attr="data-open=${editable},hidden=${!editable ? 'hidden' : null}"
            th:classappend="${prediction != null ? @uiLabels.predictionResultClass(classification) : ''}">
            <td th:text="${match.matchNo}"></td>
            <td class="nowrap" th:text="${@matchTimes.formatTurkiye(match.kickoffAt)}"></td>
            <td>
                <span th:text="${@uiLabels.matchStage(match.stage)}"></span>
                <span th:if="${match.groupCode}" th:text="| / ${match.groupCode}|"></span>
            </td>
            <td>
                <span th:text="${match.homeTeam != null ? match.homeTeam.name : (match.placeholderHome != null ? match.placeholderHome : 'Belirlenecek')}"></span>
                <span> - </span>
                <span th:text="${match.awayTeam != null ? match.awayTeam.name : (match.placeholderAway != null ? match.placeholderAway : 'Belirlenecek')}"></span>
            </td>
            <td>
                <span th:if="${match.homeScore != null and match.awayScore != null}" th:text="|${match.homeScore} - ${match.awayScore}|"></span>
                <span th:if="${match.penaltyWinner != null}" class="muted"
                      th:text="| Penaltı: ${@uiLabels.matchSideLabel(match, match.penaltyWinner)}|"></span>
                <span th:unless="${match.homeScore != null and match.awayScore != null}" class="muted">Bekliyor</span>
            </td>
            <td>
                <form class="actions prediction-form"
                      th:action="@{/matches/{id}/predictions(id=${match.id})}"
                      th:attr="data-ajax-action=@{/matches/{id}/predictions/ajax(id=${match.id})}"
                      method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <input type="hidden" name="tournamentId" th:value="${selectedTournament.id}">
                    <input class="score-input" type="number" min="0" name="predictedHomeScore"
                           th:value="${prediction != null ? prediction.predictedHomeScore : ''}"
                           th:disabled="${!editable}" required>
                    <input class="score-input" type="number" min="0" name="predictedAwayScore"
                           th:value="${prediction != null ? prediction.predictedAwayScore : ''}"
                           th:disabled="${!editable}" required>
                    <select class="penalty-select" name="predictedPenaltyWinner"
                            th:if="${@uiLabels.eliminationStage(match.stage)}"
                            th:disabled="${!editable or prediction == null or prediction.predictedHomeScore == null or prediction.predictedAwayScore == null or prediction.predictedHomeScore != prediction.predictedAwayScore}"
                            data-penalty-winner>
                        <option value="">Penaltı</option>
                        <option value="HOME"
                                th:selected="${prediction != null and prediction.predictedPenaltyWinner == T(com.example.footballprediction.domain.TargetSide).HOME}"
                                th:text="|Penaltı: ${@uiLabels.matchSideLabel(match, T(com.example.footballprediction.domain.TargetSide).HOME)}|"></option>
                        <option value="AWAY"
                                th:selected="${prediction != null and prediction.predictedPenaltyWinner == T(com.example.footballprediction.domain.TargetSide).AWAY}"
                                th:text="|Penaltı: ${@uiLabels.matchSideLabel(match, T(com.example.footballprediction.domain.TargetSide).AWAY)}|"></option>
                    </select>
                    <button type="submit" th:disabled="${!editable}">Kaydet</button>
                    <span class="row-status" data-row-status aria-live="polite"></span>
                    <span th:if="${!editable}" class="muted">Tahmin süresi doldu</span>
                </form>
            </td>
        </tr>
        <tr th:if="${#lists.isEmpty(matches)}">
            <td colspan="6">Henüz maç yok.</td>
        </tr>
        <tr data-no-visible-matches-row hidden>
            <td colspan="6">Açık tahmin yok.</td>
        </tr>
        </tbody>
    </table>
</main>
<script th:src="@{/js/matches.js}"></script>
</body>
</html>
