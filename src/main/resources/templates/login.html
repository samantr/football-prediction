<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments :: head('Login')}"></head>
<body>
<nav th:replace="~{fragments :: nav}"></nav>
<main class="container narrow">
    <div th:replace="~{fragments :: flash}"></div>

    <section class="surface">
        <h1>Login</h1>
        <div th:if="${param.error}" class="alert error">Invalid email or password.</div>
        <div th:if="${param.logout}" class="alert success">You have been logged out.</div>

        <form th:action="@{/login}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <p>
                <label for="username">Email</label>
                <input id="username" type="email" name="username" required autofocus>
            </p>
            <p>
                <label for="password">Password</label>
                <input id="password" type="password" name="password" required>
            </p>
            <button type="submit">Login</button>
        </form>
    </section>
</main>
</body>
</html>
