<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:fragment="head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${title} + ' | Futbol Tahminleri'">Futbol Tahminleri</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<nav th:fragment="nav" class="topbar">
    <a class="brand" th:href="@{/leaderboard}">Futbol Tahminleri</a>
    <a th:href="@{/leaderboard}">Puan Durumu</a>
    <a sec:authorize="isAuthenticated()" th:href="@{/matches}">Maçlar</a>
    <a sec:authorize="isAuthenticated()" th:href="@{/my-predictions}">Tahminlerim</a>
    <a sec:authorize="hasRole('ADMIN')" th:href="@{/admin}">Yönetim</a>
    <span class="spacer"></span>
    <a sec:authorize="isAuthenticated()" th:href="@{/account/change-password}">Change Password</a>
    <span sec:authorize="isAuthenticated()" class="muted" sec:authentication="name"></span>
    <form sec:authorize="isAuthenticated()" class="inline-form" th:action="@{/logout}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
        <button type="submit" class="link-button">Çıkış Yap</button>
    </form>
    <a sec:authorize="!isAuthenticated()" th:href="@{/login}">Giriş Yap</a>
    <a sec:authorize="!isAuthenticated()" th:href="@{/signup}">Kayıt Ol</a>
</nav>

<div th:fragment="flash">
    <div th:if="${success}" class="alert success" th:text="${success}"></div>
    <div th:if="${error}" class="alert error" th:text="${error}"></div>
    <div th:if="${messages}" class="alert neutral">
        <div th:each="message : ${messages}" th:text="${message}"></div>
    </div>
</div>
</body>
</html>
